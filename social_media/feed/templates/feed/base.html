<!DOCTYPE html>
<html>
<head>
    <title>Social Media App</title>
</head>
<body>
    {% if user.is_authenticated %}
        <p>Logged in as {{ user.username }} |
        <a href="{% url 'feed:profile' %}">Profile</a> |
        <a href="{% url 'logout' %}">Logout</a></p>
    {% else %}
        <p><a href="{% url 'login' %}">Login</a> | <a href="{% url 'feed:register' %}">Register</a></p>
    {% endif %}
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
